name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    uses: ./.github/workflows/ci.yml

  package:
    name: Package (${{ matrix.runtime }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            archive: artifacts/BugSwatter-*-win-x64.zip
          - os: ubuntu-latest
            runtime: linux-x64
            archive: artifacts/BugSwatter-*-linux-x64.tar.gz

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Build release archive
        shell: pwsh
        run: ./scripts/package-release.ps1 -Runtime '${{ matrix.runtime }}' -ExpectedTag '${{ github.ref_name }}'

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.runtime }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Write SHA-256 checksums
        working-directory: release-assets
        run: sha256sum BugSwatter-* > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create '${{ github.ref_name }}' release-assets/* --verify-tag --generate-notes --title 'BugSwatter ${{ github.ref_name }}'
